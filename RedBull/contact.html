<h1>Pour me contacter !</h1>






    <!--Début de formulaire-->

    <!-- action c’est l’URL pour l'app Formspree et method="POST" c'est pour envoyer les données-->
    <form action="https://formspree.io/f/xwvwnbkg" method="POST">
        <!--C'est un champ-->
        <fieldset>
            <legend>Vos coordonnées </legend>

            <div>
                <label for="LastName">Votre nom</label>
                <input type="text" id="LastName" name="LastName">
            </div>

            <div>
                <label for="FirstName">Votre prénom</label>
                <input type="text" id="FirstName" name="FirstName">
            </div>

            <div>
                <label for="adress">Votre adresse</label>
                <input type="text" id="adress" name="adress">
            </div>

            <div>
                <label for="localisation">Le lieu (Rue du ...)</label>
                <input type="text" id="localisation" name="localisation">
            </div>

            <div>
                <label for="NPA">N° Postal (NPA)</label>
                <input type="number" id="NPA" name="NPA">
            </div>

            <div>
                <label for="email">L’adresse mail</label>
                <input type="email" id="email" name="email">
            </div>

            <div>
                <label for="PhoneNumbre">Numéro de téléphone</label>
                <input type="tel" id="PhoneNumbre" name="PhoneNumbre">
            </div>

        </fieldset>

        <fieldset>
            <legend>Avez-vous aimé ?</legend>

        
           
                <input class="radiobox" type="radio" name="avis" value="oui"> Oui
                <input class="radiobox" type="radio" name="avis" value="bof"> Bof
                <input class="radiobox" type="radio" name="avis" value="non"> Non
          

            <div>
                <label for="note">Une note ?</label>
                <select id="note" name="note">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </div>
            
            <div>
                <label for="message">Un message</label>
                <div>
                    <textarea id="message" name="message" placeholder="Un message / une requête à faire ?"></textarea>
                </div>
            </div>
            
          <input type="submit" value="Envoyer">  

        </fieldset>


    </form>
